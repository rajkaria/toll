version: "3.8"

services:
  toll-gateway:
    build: .
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - TOLL_SERVER_SECRET=${TOLL_SERVER_SECRET}
      - TOLL_SERVER_ADDRESS=${TOLL_SERVER_ADDRESS}
      - TOLL_DATA_DIR=/data
      - X402_FACILITATOR_URL=https://x402.org/facilitator
    volumes:
      - toll-data:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  toll-data:
  redis-data:
