replicaCount: 1

image:
  repository: toll-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3002

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

env:
  PORT: "3002"
  TOLL_DATA_DIR: "/data"
  X402_FACILITATOR_URL: "https://x402.org/facilitator"

redis:
  enabled: true
  url: "redis://toll-redis:6379"

config:
  network: "testnet"
  payTo: ""
  facilitatorUrl: "https://x402.org/facilitator"
  defaultPaymentMode: "x402"
